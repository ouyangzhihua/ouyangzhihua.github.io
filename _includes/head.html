<head>
    <meta charset="utf-8">
	<!-- 告诉IE浏览器，IE8/9及以后的版本都会以最高版本IE来渲染页面 -->
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <title>{% if page.title %}{{ page.title }}{% else %}{{ site.title }}{% endif %}</title>
    <meta name="viewport" content="width=device-width">
    <meta name="description" content="{{ site.description }}">
    <meta name="keywords" content="{{ site.keywords }}" />
    {% if site.meta_author %}<meta name="author" content="{{ site.meta_author }}">{% endif %}

    <!-- Custom CSS & Bootstrap Core CSS - Uses Bootswatch Flatly Theme: http://bootswatch.com/flatly/ -->
    <link rel="stylesheet" href="{{ "/style.css" }}">

    <!-- Google verification -->
    {% if site.google_verify %}<meta name="google-site-verification" content="{{ site.google_verify }}">{% endif %}

    <!-- Bing Verification -->
    {% if site.bing_verify %}<meta name="msvalidate.01" content="{{ site.bing_verify }}">{% endif %}

    <!-- Custom Fonts -->
    <link rel="stylesheet" href="{{ "/css/font-awesome/css/font-awesome.min.css" }}">
    <link href="//fonts.googleapis.com/css?family=Montserrat:400,700" rel="stylesheet" type="text/css">
    <link href="//fonts.googleapis.com/css?family=Lato:400,700,400italic,700italic" rel="stylesheet" type="text/css">

	<!-- 使用MAthjax渲染，显示latex格式的公式 -->
	<link rel="dns-prefetch" href="//cdn.bootcss.com" />   <!-- 加一个dns-prefetch用于网页加速 -->
	<link rel="dns-prefetch" href="//cdn.mathjax.org" />
	<script type="text/x-mathjax-config">
	    MathJax.Hub.Config({
	        tex2jax: {
	        skipTags: ['script', 'noscript', 'style', 'textarea', 'pre'],	
	        inlineMath: [ ['$','$'], ["\\(","\\)"] ], 		<!-- 行内公式选择符 -->
			displayMath: [ ['$$','$$'], ["\\[","\\]"] ], 		<!-- 段内公式选择符 -->
	        }
	    });
	</script>  
	<script src="https://cdn.bootcss.com/mathjax/2.7.7/MathJax.js"></script>
	
	
    <!-- HTML5 Shim and Respond.js IE8 support of HTML5 elements and media queries -->
    <!-- WARNING: Respond.js doesn't work if you view the page via file:// -->
    <!--[if lt IE 9]>
        <script src="https://oss.maxcdn.com/libs/html5shiv/3.7.0/html5shiv.js"></script>
        <script src="https://oss.maxcdn.com/libs/respond.js/1.4.2/respond.min.js"></script>
    <![endif]-->
</head>
